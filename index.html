<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>出貨計算器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0d;
  --surface: #ffffff;
  --surface-alt: #f4f4f5;
  --border: #e4e4e7;
  --ink: #0a0a0a;
  --ink-soft: #52525b;
  --ink-faint: #a1a1aa;
  --accent-price: #2563eb;
  --accent-price-deep: #1d4ed8;
  --accent-discount: #7c3aed;
  --accent-discount-deep: #5b21b6;
  --accent-danger: #dc2626;
  --accent-danger-deep: #991b1b;
  --accent-success: #16a34a;
  --accent-calc: #0891b2;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04), 0 2px 8px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'Microsoft JhengHei', sans-serif;
  background: #e8e8ea;
  color: var(--ink);
  min-height: 100vh;
  overscroll-behavior: none;
}

body {
  padding: 12px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
}

.container { max-width: 520px; margin: 0 auto; }

/* ==================== Timestamp (放大、置中、拿掉 REC) ==================== */
.timestamp {
  background: var(--bg);
  color: #fff;
  padding: 26px 16px;
  border-radius: 14px;
  text-align: center;
  margin-bottom: 10px;
  box-shadow: var(--shadow-md);
  position: relative;
}
.ts-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 40px;
  font-weight: 800;
  letter-spacing: 2px;
  font-variant-numeric: tabular-nums;
  line-height: 1.1;
}

/* Sound toggle — 縮小 & 嵌在時間戳右上角 */
.sound-toggle {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 30px; height: 30px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  color: white;
  border: none;
  font-size: 13px;
  padding: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 3;
  overflow: hidden;
}
.sound-toggle.off { opacity: 0.4; }

/* ==================== Member Input (連貫顯示、放大) ==================== */
.member-input {
  background: var(--surface);
  border-radius: 14px;
  padding: 18px 18px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
  border: 1.5px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.08s, box-shadow 0.15s;
  position: relative;
  overflow: hidden;
  min-height: 72px;
}
.member-input:active { transform: scale(0.99); }
.member-input.has-value {
  border-color: var(--accent-price);
  background: #eff6ff;
  box-shadow: 0 2px 10px rgba(37, 99, 235, 0.15);
}
.member-input-text {
  font-size: 24px;
  font-weight: 800;
  color: var(--ink-soft);
  display: flex;
  align-items: baseline;
  flex-wrap: nowrap;
  letter-spacing: 0.5px;
}
.member-input.has-value .member-input-text { color: var(--accent-price-deep); }
.mi-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 32px;
  font-weight: 800;
  letter-spacing: 3px;
  margin-left: 2px;
}
.mi-edit {
  font-size: 12px;
  color: var(--accent-price);
  font-weight: 700;
  padding: 4px 10px;
  background: #dbeafe;
  border-radius: 20px;
  margin-left: 8px;
  flex-shrink: 0;
}

/* ==================== Total Display ==================== */
.display {
  background: var(--surface);
  border-radius: 14px;
  padding: 18px 20px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
}
.display-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.display-label {
  font-size: 12px; color: var(--ink-faint);
  font-weight: 500; letter-spacing: 0.5px;
  text-transform: uppercase;
}
.display-qty {
  font-size: 14px; color: var(--ink-soft);
  font-weight: 700;
  background: var(--surface-alt);
  padding: 4px 10px;
  border-radius: 20px;
}
.display-qty strong {
  font-family: 'JetBrains Mono', monospace;
  color: var(--ink); font-weight: 800;
}
.display-amount {
  font-family: 'JetBrains Mono', monospace;
  font-size: 52px; font-weight: 800;
  color: var(--ink); text-align: right;
  line-height: 1; letter-spacing: -1px;
  font-variant-numeric: tabular-nums;
  margin: 4px 0 8px;
  transition: transform 0.2s ease;
}
.display-amount.bump { transform: scale(1.04); }
.display-amount .currency {
  font-size: 28px; font-weight: 500;
  color: var(--ink-faint);
  margin-right: 6px;
  vertical-align: 8px;
}
.items-list {
  border-top: 1px dashed var(--border);
  padding-top: 10px;
  margin-top: 6px;
}
.items-list:empty::before {
  content: '尚未加入商品';
  display: block;
  text-align: center;
  color: var(--ink-faint);
  font-size: 13px;
  padding: 10px 0;
  font-weight: 500;
}
.item-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 0;
  font-size: 14px;
  color: var(--ink-soft);
  animation: rowIn 0.25s ease-out;
}
@keyframes rowIn {
  from { opacity: 0; transform: translateX(-8px); }
  to { opacity: 1; transform: translateX(0); }
}
.item-row + .item-row { border-top: 1px solid #f4f4f5; }
.item-row .label { display: flex; align-items: center; gap: 8px; }
.item-row .label .tag {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent-price);
  flex-shrink: 0;
}
.item-row.manual .label .tag { background: var(--accent-calc); }
.item-row.discount .label .tag { background: var(--accent-discount); }
.item-row.credit-row .label .tag { background: var(--accent-danger); }
.item-row.deduct-row .label .tag { background: var(--accent-danger); }
.item-row .val {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}
.item-row.discount .val { color: var(--accent-discount); }
.item-row.credit-row .val,
.item-row.deduct-row .val { color: var(--accent-danger); font-weight: 800; }
.item-row.credit-row .label,
.item-row.deduct-row .label { color: var(--accent-danger); font-weight: 700; }

/* ==================== Button Base with effects ==================== */
button {
  border: none;
  padding: 16px 8px;
  border-radius: 12px;
  font-family: inherit;
  font-weight: 700;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.12s cubic-bezier(0.4, 0, 0.2, 1), filter 0.12s, box-shadow 0.12s;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
  isolation: isolate;
}
button:active {
  transform: scale(0.93);
  filter: brightness(0.88);
}

.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.55);
  transform: translate(-50%, -50%) scale(0);
  animation: rippleAni 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none;
  z-index: 0;
}
@keyframes rippleAni {
  to { transform: translate(-50%, -50%) scale(3.5); opacity: 0; }
}
.action-btn .ripple,
.calc-num .ripple { background: rgba(37, 99, 235, 0.25); }
.action-btn.reset .ripple { background: rgba(220, 38, 38, 0.25); }
button > * { position: relative; z-index: 1; }

@keyframes pressGlow {
  0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.5); }
  100% { box-shadow: 0 0 0 12px rgba(255,255,255,0); }
}
button.flash { animation: pressGlow 0.4s ease-out; }

.grid { display: grid; gap: 8px; margin-bottom: 10px; }
.g-2 { grid-template-columns: repeat(2, 1fr); }
.g-3 { grid-template-columns: repeat(3, 1fr); }
.g-4 { grid-template-columns: repeat(4, 1fr); }

/* ==================== Preset Price Buttons ==================== */
.quick-btn {
  background: linear-gradient(180deg, #3b82f6 0%, var(--accent-price) 100%);
  color: white;
  font-family: 'JetBrains Mono', monospace;
  font-size: 26px; font-weight: 800;
  padding: 22px 4px;
  box-shadow: 0 2px 8px rgba(37, 99, 235, 0.25);
  min-height: 82px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.quick-btn .qty-badge {
  position: absolute;
  top: 6px; right: 6px;
  background: rgba(255,255,255,0.25);
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px;
  font-weight: 800;
  padding: 3px 11px;
  border-radius: 20px;
  min-width: 36px;
  text-align: center;
  line-height: 1;
  transition: all 0.2s ease;
}
.quick-btn .qty-badge.has {
  background: white;
  color: var(--accent-price-deep);
  box-shadow: 0 2px 8px rgba(0,0,0,0.18);
}
.quick-btn .qty-badge.pop { animation: badgePop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); }
@keyframes badgePop {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

/* ==================== Discount Buttons ==================== */
.discount-btn {
  background: linear-gradient(180deg, #8b5cf6 0%, var(--accent-discount) 100%);
  color: white;
  font-size: 15px;
  padding: 14px 8px;
  box-shadow: 0 2px 8px rgba(124, 58, 237, 0.2);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  min-height: 72px;
}
.discount-btn.discount-big {
  font-size: 30px;
  font-weight: 800;
  letter-spacing: 8px;
  padding-left: 16px;
}
.discount-btn.active {
  background: linear-gradient(180deg, var(--accent-discount-deep) 0%, #4c1d95 100%);
  box-shadow: 0 2px 8px rgba(88, 28, 135, 0.4), inset 0 0 0 2px rgba(255,255,255,0.5);
}
.discount-btn.active::after {
  content: '✓';
  position: absolute;
  top: 4px; right: 8px;
  font-size: 12px;
  background: white;
  color: var(--accent-discount-deep);
  width: 18px; height: 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  z-index: 2;
}
.discount-btn .d-sub {
  font-size: 11px;
  font-weight: 500;
  opacity: 0.9;
}
.discount-btn .d-sub.has-credit {
  display: inline-block;
  background: white;
  color: var(--accent-danger);
  font-weight: 900;
  font-size: 17px;
  padding: 3px 14px;
  border-radius: 20px;
  margin-top: 4px;
  opacity: 1;
  letter-spacing: 0.3px;
  box-shadow: 0 2px 6px rgba(220, 38, 38, 0.35);
  font-family: 'JetBrains Mono', monospace;
}

/* ==================== Action Buttons ==================== */
.action-btn {
  background: white;
  color: var(--ink-soft);
  border: 1.5px solid var(--border);
  font-size: 13px;
  padding: 12px 8px;
}
.action-btn.reset { background: #fef2f2; color: var(--accent-danger); border-color: #fecaca; }

/* ==================== Calculator ==================== */
.calc-section {
  background: var(--surface);
  border-radius: 14px;
  padding: 12px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
}
.calc-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
  padding: 0 4px;
}
.calc-title {
  font-size: 11px; font-weight: 700;
  color: var(--ink-faint);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.calc-display {
  background: #0a0a0a;
  color: #fff;
  padding: 14px 18px;
  border-radius: 10px;
  text-align: right;
  font-family: 'JetBrains Mono', monospace;
  font-size: 32px; font-weight: 700;
  margin-bottom: 10px;
  font-variant-numeric: tabular-nums;
  min-height: 60px;
  word-break: break-all;
  line-height: 1.1;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  direction: rtl;
}
/* Negative sign in red for clarity */
.calc-display.negative { color: #fca5a5; }
.calc-expr {
  font-size: 12px; color: #71717a;
  margin-bottom: 2px;
  font-family: 'JetBrains Mono', monospace;
  min-height: 14px;
}
.calc-btn {
  padding: 15px 4px;
  font-size: 20px;
  font-weight: 700;
  font-family: 'JetBrains Mono', monospace;
}
.calc-num { background: white; color: var(--ink); border: 1px solid var(--border); }
.calc-op { background: var(--ink); color: white; }
.calc-eq { background: var(--accent-success); color: white; }
.calc-fn { background: var(--surface-alt); color: var(--ink-soft); font-size: 16px; }
.calc-add {
  background: linear-gradient(180deg, #22d3ee 0%, var(--accent-calc) 100%);
  color: white;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 15px;
}

/* ==================== Modal ==================== */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
}
.modal-bg.show { display: flex; animation: fadeIn 0.15s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: white;
  border-radius: 18px;
  padding: 24px;
  width: 100%;
  max-width: 360px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  animation: modalIn 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes modalIn {
  from { transform: scale(0.92); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.modal-title { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
.modal-sub { font-size: 13px; color: var(--ink-soft); margin-bottom: 16px; }
.modal-input {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid var(--border);
  border-radius: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 28px; font-weight: 700;
  text-align: center;
  margin-bottom: 16px;
  outline: none;
  transition: border-color 0.15s;
  letter-spacing: 3px;
}
.modal-input:focus { border-color: var(--accent-price); }
.modal-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.modal-btn { padding: 13px; font-size: 15px; font-weight: 700; }
.modal-cancel { background: var(--surface-alt); color: var(--ink-soft); }
.modal-ok { background: var(--ink); color: white; }

/* ==================== Toast ==================== */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink);
  color: white;
  padding: 10px 20px;
  border-radius: 24px;
  font-size: 14px; font-weight: 600;
  opacity: 0;
  transition: all 0.25s ease;
  pointer-events: none;
  z-index: 2000;
  box-shadow: 0 6px 20px rgba(0,0,0,0.25);
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

@media (max-width: 380px) {
  .display-amount { font-size: 42px; }
  .display-amount .currency { font-size: 22px; vertical-align: 6px; }
  .quick-btn { font-size: 22px; min-height: 76px; }
  .quick-btn .qty-badge { font-size: 17px; min-width: 30px; }
  .calc-display { font-size: 26px; }
  .discount-btn .d-sub.has-credit { font-size: 15px; }
  .discount-btn.discount-big { font-size: 26px; letter-spacing: 6px; }
  .ts-date { font-size: 32px; }
  .member-input-text { font-size: 20px; }
  .mi-num { font-size: 26px; }
}
</style>
</head>
<body>

<div class="container">

  <!-- Timestamp (年月日、置中、放大) -->
  <div class="timestamp">
    <button class="sound-toggle" id="soundToggle" aria-label="切換音效">🔊</button>
    <div class="ts-date" id="ts-date">----/--/--</div>
  </div>

  <!-- Member Number -->
  <div class="member-input" id="memberInput">
    <div class="member-input-text" id="memberInputText">請輸入會員編號</div>
    <div class="mi-edit">編輯</div>
  </div>

  <!-- Total Display -->
  <div class="display">
    <div class="display-header">
      <span class="display-label">合計金額</span>
      <span class="display-qty">共 <strong id="totalQty">0</strong> 件</span>
    </div>
    <div class="display-amount" id="displayAmount">
      <span class="currency">NT$</span><span id="totalAmount">0</span>
    </div>
    <div class="items-list" id="itemsList"></div>
  </div>

  <!-- Preset Price Buttons -->
  <div class="grid g-4">
    <button class="quick-btn" data-price="120">
      <span class="qty-badge" id="badge-120">0</span>
      $120
    </button>
    <button class="quick-btn" data-price="150">
      <span class="qty-badge" id="badge-150">0</span>
      $150
    </button>
    <button class="quick-btn" data-price="180">
      <span class="qty-badge" id="badge-180">0</span>
      $180
    </button>
    <button class="quick-btn" data-price="200">
      <span class="qty-badge" id="badge-200">0</span>
      $200
    </button>
  </div>

  <!-- Discount Buttons -->
  <div class="grid g-2">
    <button class="discount-btn discount-big" id="shopeeBtn">折扣</button>
    <button class="discount-btn" id="creditBtn">
      購物金折抵
      <span class="d-sub" id="creditSub">點擊輸入金額</span>
    </button>
  </div>

  <!-- Action Buttons -->
  <div class="grid g-2">
    <button class="action-btn" id="undoBtn">↶ 復原上一筆</button>
    <button class="action-btn reset" id="resetBtn">清除全部</button>
  </div>

  <!-- Calculator -->
  <div class="calc-section">
    <div class="calc-header">
      <span class="calc-title">Calculator</span>
      <span class="calc-title">加減乘除</span>
    </div>
    <div class="calc-expr" id="calcExpr">&nbsp;</div>
    <div class="calc-display" id="calcDisplay">0</div>
    <div class="grid g-4" style="margin-bottom: 0;">
      <button class="calc-btn calc-fn" onclick="calcClear()">AC</button>
      <button class="calc-btn calc-fn" onclick="calcBackspace()">⌫</button>
      <button class="calc-btn calc-fn" onclick="toggleSign()">±</button>
      <button class="calc-btn calc-op" onclick="calcOp('/')">÷</button>
      <button class="calc-btn calc-num" onclick="calcNum('7')">7</button>
      <button class="calc-btn calc-num" onclick="calcNum('8')">8</button>
      <button class="calc-btn calc-num" onclick="calcNum('9')">9</button>
      <button class="calc-btn calc-op" onclick="calcOp('*')">×</button>
      <button class="calc-btn calc-num" onclick="calcNum('4')">4</button>
      <button class="calc-btn calc-num" onclick="calcNum('5')">5</button>
      <button class="calc-btn calc-num" onclick="calcNum('6')">6</button>
      <button class="calc-btn calc-op" onclick="calcOp('-')">−</button>
      <button class="calc-btn calc-num" onclick="calcNum('1')">1</button>
      <button class="calc-btn calc-num" onclick="calcNum('2')">2</button>
      <button class="calc-btn calc-num" onclick="calcNum('3')">3</button>
      <button class="calc-btn calc-op" onclick="calcOp('+')">+</button>
      <button class="calc-btn calc-num" onclick="calcNum('0')">0</button>
      <button class="calc-btn calc-num" onclick="calcNum('.')">.</button>
      <button class="calc-btn calc-eq" onclick="calcEqual()">=</button>
      <button class="calc-btn calc-add" onclick="addCalcToOrder()">加入</button>
    </div>
  </div>

</div>

<!-- Input Modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title" id="modalTitle">輸入金額</div>
    <div class="modal-sub" id="modalSub">請輸入金額</div>
    <input class="modal-input" id="modalInput" type="number" inputmode="decimal" placeholder="0">
    <div class="modal-actions">
      <button class="modal-btn modal-cancel" onclick="closeModal()">取消</button>
      <button class="modal-btn modal-ok" onclick="confirmModal()">確定</button>
    </div>
  </div>
</div>

<!-- Confirm Modal -->
<div class="modal-bg" id="confirmModalBg">
  <div class="modal">
    <div class="modal-title" id="confirmTitle">確認</div>
    <div class="modal-sub" id="confirmSub" style="margin-bottom: 20px;">請確認操作</div>
    <div class="modal-actions">
      <button class="modal-btn modal-cancel" onclick="closeConfirm()">取消</button>
      <button class="modal-btn" id="confirmOkBtn" style="background: var(--accent-danger); color: white;" onclick="confirmYes()">確定清除</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ==================== Feedback: Sound + Vibrate ====================
let audioCtx = null;
let soundOn = true;
try { if (localStorage.getItem('calc_sound') === 'off') soundOn = false; } catch(e) {}

function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) { return null; }
  }
  if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
  return audioCtx;
}

function tone(freq, duration, type = 'sine', gain = 0.08) {
  if (!soundOn) return;
  const ctx = getAudio(); if (!ctx) return;
  try {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    g.gain.setValueAtTime(gain, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
    osc.connect(g); g.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}
function sndClick() { tone(900, 0.025, 'sine', 0.07); }
function sndAdd()   { tone(1100, 0.03, 'sine', 0.08); setTimeout(() => tone(1500, 0.05, 'sine', 0.08), 35); }
function sndRemove(){ tone(500, 0.06, 'sine', 0.08); }
function sndEqual() { tone(880, 0.04, 'sine', 0.08); setTimeout(() => tone(1320, 0.08, 'triangle', 0.08), 45); }
function sndError() { tone(200, 0.12, 'sawtooth', 0.06); }

function vibrate(ms = 10) {
  if (navigator.vibrate) { try { navigator.vibrate(ms); } catch(e) {} }
}

function fbTap()    { vibrate(10); sndClick(); }
function fbAdd()    { vibrate(18); sndAdd();   }
function fbRemove() { vibrate(25); sndRemove();}
function fbEqual()  { vibrate(20); sndEqual(); }
function fbError()  { vibrate(60); sndError();}

// Sound toggle
const soundToggle = document.getElementById('soundToggle');
function updateSoundToggle() {
  soundToggle.textContent = soundOn ? '🔊' : '🔇';
  soundToggle.classList.toggle('off', !soundOn);
}
updateSoundToggle();
soundToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  soundOn = !soundOn;
  try { localStorage.setItem('calc_sound', soundOn ? 'on' : 'off'); } catch(e) {}
  updateSoundToggle();
  if (soundOn) { sndClick(); vibrate(15); }
  else { vibrate(15); }
});

// ==================== Ripple effect ====================
document.addEventListener('pointerdown', (e) => {
  const btn = e.target.closest('button');
  if (!btn || btn.id === 'soundToggle') return;
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height) * 1.5;
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  ripple.style.width = size + 'px';
  ripple.style.height = size + 'px';
  ripple.style.left = x + 'px';
  ripple.style.top = y + 'px';
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 550);
});

document.addEventListener('click', (e) => {
  const btn = e.target.closest('.quick-btn, .discount-btn, .calc-add, .calc-eq');
  if (!btn) return;
  btn.classList.remove('flash');
  void btn.offsetWidth;
  btn.classList.add('flash');
});

// ==================== Timestamp (年月日 only) ====================
function updateTime() {
  const d = new Date();
  const p = n => String(n).padStart(2, '0');
  document.getElementById('ts-date').textContent =
    `${d.getFullYear()} / ${p(d.getMonth()+1)} / ${p(d.getDate())}`;
}
updateTime();
setInterval(updateTime, 60000); // 每分鐘更新一次（日期不太會變）

// ==================== State ====================
let history = [];
let memberNumber = null;

// ==================== Helpers ====================
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 1600);
}
function formatMoney(n) { return Math.round(Math.abs(n)).toLocaleString('en-US'); }

function bumpTotal() {
  const el = document.getElementById('displayAmount');
  el.classList.remove('bump');
  void el.offsetWidth;
  el.classList.add('bump');
  setTimeout(() => el.classList.remove('bump'), 200);
}
function popBadge(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
  setTimeout(() => el.classList.remove('pop'), 400);
}

// ==================== Input Modal ====================
let modalCallback = null;
let modalValidator = null;

function openModal(opts) {
  const {
    title, sub,
    defaultValue = '',
    inputType = 'number',
    inputMode = 'decimal',
    maxLength = null,
    placeholder = '0',
    validator = (v) => { const n = parseFloat(v); return !isNaN(n) && n > 0 ? n : null; },
    callback
  } = opts;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalSub').textContent = sub;
  const input = document.getElementById('modalInput');
  input.type = inputType;
  input.inputMode = inputMode;
  input.placeholder = placeholder;
  if (maxLength) input.setAttribute('maxlength', maxLength);
  else input.removeAttribute('maxlength');
  input.value = defaultValue;
  modalCallback = callback;
  modalValidator = validator;
  document.getElementById('modal').classList.add('show');
  setTimeout(() => { input.focus(); input.select(); }, 50);
}
function closeModal() {
  document.getElementById('modal').classList.remove('show');
  modalCallback = null;
  modalValidator = null;
}
function confirmModal() {
  const rawVal = document.getElementById('modalInput').value;
  const validated = modalValidator ? modalValidator(rawVal) : rawVal;
  if (validated === null || validated === undefined) {
    fbError();
    toast('請輸入有效的值');
    return;
  }
  const cb = modalCallback;
  closeModal();
  if (cb) cb(validated);
}
document.getElementById('modalInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmModal();
  if (e.key === 'Escape') closeModal();
});
document.getElementById('modal').addEventListener('click', e => {
  if (e.target.id === 'modal') closeModal();
});

// ==================== Confirm Modal ====================
let confirmCallback = null;
function showConfirm(title, sub, okText, callback) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmSub').textContent = sub;
  document.getElementById('confirmOkBtn').textContent = okText || '確定';
  confirmCallback = callback;
  document.getElementById('confirmModalBg').classList.add('show');
}
function closeConfirm() {
  document.getElementById('confirmModalBg').classList.remove('show');
  confirmCallback = null;
}
function confirmYes() {
  const cb = confirmCallback;
  closeConfirm();
  if (cb) cb();
}
document.getElementById('confirmModalBg').addEventListener('click', e => {
  if (e.target.id === 'confirmModalBg') closeConfirm();
});

// ==================== Order Logic ====================
function addItem(price, type, label) {
  history.push({ kind: 'item', price, type, label });
  fbAdd();
  render();
  bumpTotal();
}

// Member number
document.getElementById('memberInput').addEventListener('click', () => {
  openModal({
    title: '會員編號',
    sub: '請輸入 4 位數會員編號',
    defaultValue: memberNumber ?? '',
    inputType: 'text',
    inputMode: 'numeric',
    maxLength: 4,
    placeholder: '0000',
    validator: (v) => {
      const trimmed = String(v).trim();
      if (!/^\d{1,4}$/.test(trimmed)) return null;
      return trimmed.padStart(4, '0');
    },
    callback: (val) => {
      memberNumber = val;
      fbAdd();
      render();
      toast(`會員編號：${val}`);
    }
  });
});

// Preset price buttons
document.querySelectorAll('.quick-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const p = parseFloat(btn.dataset.price);
    addItem(p, 'preset', `$${p}`);
    popBadge(`badge-${p}`);
  });
});

// Discount toggle
document.getElementById('shopeeBtn').addEventListener('click', () => {
  const idx = history.findIndex(h => h.kind === 'shopee');
  if (idx >= 0) {
    history.splice(idx, 1);
    fbRemove();
    toast('已取消折扣');
  } else {
    history.push({ kind: 'shopee' });
    fbAdd();
    toast('折扣 9 折已套用');
  }
  render();
  bumpTotal();
});

// Shopping credit
document.getElementById('creditBtn').addEventListener('click', () => {
  openModal({
    title: '購物金折抵',
    sub: '輸入客人要折抵的購物金金額',
    defaultValue: '',
    inputType: 'number',
    inputMode: 'decimal',
    placeholder: '0',
    callback: (val) => {
      history.push({ kind: 'credit', amount: val });
      fbAdd();
      render();
      bumpTotal();
      toast(`已折抵購物金 $${formatMoney(val)}`);
    }
  });
});

// Undo
document.getElementById('undoBtn').addEventListener('click', () => {
  if (history.length === 0) {
    fbError();
    toast('沒有可復原的項目');
    return;
  }
  const last = history.pop();
  fbRemove();
  let msg = '已復原上一筆';
  if (last.kind === 'item') msg = `已移除 ${last.label}`;
  else if (last.kind === 'shopee') msg = '已取消折扣';
  else if (last.kind === 'credit') msg = `已移除購物金 $${formatMoney(last.amount)}`;
  else if (last.kind === 'deduct') msg = `已取消扣款 $${formatMoney(last.amount)}`;
  toast(msg);
  render();
  bumpTotal();
});

// Reset all
document.getElementById('resetBtn').addEventListener('click', () => {
  if (history.length === 0 && memberNumber === null) {
    fbError();
    toast('目前沒有資料');
    return;
  }
  showConfirm('清除全部', '確定要清除所有商品、折扣與會員編號嗎？', '確定清除', () => {
    history = [];
    memberNumber = null;
    fbRemove();
    render();
    toast('已清除全部');
  });
});

// ==================== Render ====================
function render() {
  const groups = {};
  let subtotal = 0, totalQty = 0;
  let hasShopee = false;
  const credits = [];
  const deductions = [];
  const presetCounts = { 120: 0, 150: 0, 180: 0, 200: 0 };

  history.forEach(h => {
    if (h.kind === 'item') {
      const key = `${h.type}|${h.price}|${h.label}`;
      if (!groups[key]) groups[key] = { price: h.price, type: h.type, label: h.label, qty: 0 };
      groups[key].qty++;
      subtotal += h.price;
      totalQty++;
      if (h.type === 'preset' && presetCounts[h.price] !== undefined) presetCounts[h.price]++;
    } else if (h.kind === 'shopee') hasShopee = true;
    else if (h.kind === 'credit') credits.push(h.amount);
    else if (h.kind === 'deduct') deductions.push(h.amount);
  });

  let total = subtotal;
  const shopeeDiscount = hasShopee ? total * 0.1 : 0;
  if (hasShopee) total *= 0.9;
  const creditTotal = credits.reduce((a, b) => a + b, 0);
  const deductTotal = deductions.reduce((a, b) => a + b, 0);
  total -= creditTotal;
  total -= deductTotal;
  total = Math.round(total);
  if (total < 0) total = 0;

  document.getElementById('totalAmount').textContent = formatMoney(total);
  document.getElementById('totalQty').textContent = totalQty;

  [120, 150, 180, 200].forEach(p => {
    const el = document.getElementById(`badge-${p}`);
    el.textContent = presetCounts[p];
    el.classList.toggle('has', presetCounts[p] > 0);
  });

  const list = document.getElementById('itemsList');
  list.innerHTML = '';

  const order = { preset: 0, manual: 2 };
  const sortedGroups = Object.values(groups).sort((a, b) => {
    const d = (order[a.type] ?? 9) - (order[b.type] ?? 9);
    return d !== 0 ? d : a.price - b.price;
  });

  sortedGroups.forEach(g => {
    const row = document.createElement('div');
    row.className = 'item-row ' + (g.type === 'manual' ? 'manual' : '');
    row.innerHTML = `<span class="label"><span class="tag"></span>${g.label} × ${g.qty}</span><span class="val">$${formatMoney(g.price * g.qty)}</span>`;
    list.appendChild(row);
  });

  if (hasShopee) {
    const row = document.createElement('div');
    row.className = 'item-row discount';
    row.innerHTML = `<span class="label"><span class="tag"></span>折扣（9 折）</span><span class="val">-$${formatMoney(shopeeDiscount)}</span>`;
    list.appendChild(row);
  }
  credits.forEach(c => {
    const row = document.createElement('div');
    row.className = 'item-row credit-row';
    row.innerHTML = `<span class="label"><span class="tag"></span>購物金折抵</span><span class="val">-$${formatMoney(c)}</span>`;
    list.appendChild(row);
  });
  deductions.forEach(d => {
    const row = document.createElement('div');
    row.className = 'item-row deduct-row';
    row.innerHTML = `<span class="label"><span class="tag"></span>扣款</span><span class="val">-$${formatMoney(d)}</span>`;
    list.appendChild(row);
  });

  document.getElementById('shopeeBtn').classList.toggle('active', hasShopee);

  const creditSub = document.getElementById('creditSub');
  if (credits.length > 0) {
    creditSub.textContent = `已折抵 $${formatMoney(creditTotal)}`;
    creditSub.classList.add('has-credit');
  } else {
    creditSub.textContent = '點擊輸入金額';
    creditSub.classList.remove('has-credit');
  }

  // Member number — 連貫顯示
  const mi = document.getElementById('memberInput');
  const miText = document.getElementById('memberInputText');
  if (memberNumber !== null) {
    mi.classList.add('has-value');
    miText.innerHTML = `會員編號：<span class="mi-num">${memberNumber}</span>`;
  } else {
    mi.classList.remove('has-value');
    miText.textContent = '請輸入會員編號';
  }
}

// ==================== Calculator (支援負向) ====================
const calcState = { display: '0', prev: null, op: null, waitingForNew: false, expr: '' };

function updateCalc() {
  const disp = document.getElementById('calcDisplay');
  disp.textContent = formatCalcDisplay(calcState.display);
  // Highlight negative result in soft red
  const isNeg = calcState.display.startsWith('-') && calcState.display !== '-0' && parseFloat(calcState.display) < 0;
  disp.classList.toggle('negative', isNeg);
  document.getElementById('calcExpr').innerHTML = calcState.expr || '&nbsp;';
}

function formatCalcDisplay(s) {
  if (s === '' || s === '-') return s || '0';
  const negative = s.startsWith('-');
  const absStr = negative ? s.slice(1) : s;
  if (absStr === '' || absStr === '.') return negative ? '-' : '0';
  if (absStr === '0' || absStr === '0.') {
    // Show "-0" or "-0." literally during input
    if (s === '-0') return '-0';
    if (s === '-0.') return '-0.';
  }
  const num = parseFloat(absStr);
  if (isNaN(num)) return s;
  if (absStr.endsWith('.')) return (negative ? '-' : '') + num.toLocaleString('en-US') + '.';
  const parts = absStr.split('.');
  const intPart = parseFloat(parts[0]).toLocaleString('en-US');
  const result = parts.length > 1 ? `${intPart}.${parts[1]}` : intPart;
  return (negative ? '-' : '') + result;
}

function calcNum(n) {
  if (calcState.waitingForNew) {
    calcState.display = n === '.' ? '0.' : n;
    calcState.waitingForNew = false;
  } else {
    if (n === '.' && calcState.display.includes('.')) return;
    if (calcState.display === '0' && n !== '.') calcState.display = n;
    else if (calcState.display === '-0' && n !== '.') calcState.display = '-' + n;
    else calcState.display += n;
  }
  fbTap();
  updateCalc();
}

function calcOp(op) {
  if (calcState.prev !== null && calcState.op && !calcState.waitingForNew) compute();
  else calcState.prev = parseFloat(calcState.display);
  calcState.op = op;
  calcState.waitingForNew = true;
  const symbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
  calcState.expr = `${formatCalcDisplay(String(calcState.prev))} ${symbols[op]}`;
  fbTap();
  updateCalc();
}

function compute() {
  const cur = parseFloat(calcState.display);
  const prev = calcState.prev;
  let result;
  switch (calcState.op) {
    case '+': result = prev + cur; break;
    case '-': result = prev - cur; break;
    case '*': result = prev * cur; break;
    case '/': result = cur === 0 ? 0 : prev / cur; break;
    default: return;
  }
  result = Math.round(result * 100000000) / 100000000;
  calcState.display = String(result);
  calcState.prev = result;
}

function calcEqual() {
  if (calcState.op === null || calcState.prev === null) { fbTap(); return; }
  const symbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
  const expr = `${formatCalcDisplay(String(calcState.prev))} ${symbols[calcState.op]} ${formatCalcDisplay(calcState.display)} =`;
  compute();
  calcState.expr = expr;
  calcState.op = null;
  calcState.waitingForNew = true;
  fbEqual();
  updateCalc();
}

function calcClear() {
  calcState.display = '0';
  calcState.prev = null;
  calcState.op = null;
  calcState.waitingForNew = false;
  calcState.expr = '';
  fbRemove();
  updateCalc();
}

function calcBackspace() {
  if (calcState.waitingForNew) { fbTap(); return; }
  if (calcState.display.length <= 1 || (calcState.display.length === 2 && calcState.display.startsWith('-'))) {
    calcState.display = '0';
  } else {
    calcState.display = calcState.display.slice(0, -1);
  }
  fbTap();
  updateCalc();
}

// ± 支援在「0」的情況下啟用負數輸入
function toggleSign() {
  if (calcState.waitingForNew) {
    calcState.display = '-0';
    calcState.waitingForNew = false;
  } else if (calcState.display === '0') {
    calcState.display = '-0';
  } else if (calcState.display.startsWith('-')) {
    calcState.display = calcState.display.slice(1);
  } else {
    calcState.display = '-' + calcState.display;
  }
  fbTap();
  updateCalc();
}

// 加入 — 現在接受負值，負值視為「扣款」
function addCalcToOrder() {
  const val = parseFloat(calcState.display);
  if (isNaN(val) || val === 0) {
    fbError();
    toast('計算結果無效或為 0');
    return;
  }
  if (val > 0) {
    addItem(val, 'manual', `其他 $${val}`);
    toast(`已加入 $${formatMoney(val)}`);
  } else {
    const absVal = Math.abs(val);
    history.push({ kind: 'deduct', amount: absVal });
    fbAdd();
    render();
    bumpTotal();
    toast(`已扣款 $${formatMoney(absVal)}`);
  }
  calcClear();
}

// ==================== Init ====================
render();
updateCalc();
</script>
</body>
